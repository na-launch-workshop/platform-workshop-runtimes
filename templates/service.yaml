apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    {{- include "minio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: minio
  ports:
    - name: api
      port: {{ .Values.service.ports.api }}
      targetPort: {{ .Values.service.ports.api }}
    - name: console
      port: {{ .Values.service.ports.console }}
      targetPort: {{ .Values.service.ports.console }}
