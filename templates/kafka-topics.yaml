apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: package-receiver
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: kafka
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 604800000

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: package-deliverer
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: kafka
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 604800000
