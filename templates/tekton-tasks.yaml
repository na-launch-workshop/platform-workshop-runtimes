apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: springboot-maven-package
  namespace: {{ .Release.Namespace }}
spec:
  description: Clone the Spring Boot application from Git and run mvn -B -DskipTests package.
  params:
    - name: url
      type: string
      description: Git clone URL
    - name: revision
      type: string
      default: main
      description: Branch or tag to build
  workspaces:
    - name: source
  steps:
    - name: clone-and-package
      image: registry.access.redhat.com/ubi9/openjdk-17:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsUser: 0
      script: |
        #!/bin/bash
        set -euxo pipefail
        if command -v microdnf >/dev/null; then
          microdnf -y --nodocs --setopt=install_weak_deps=0 install git-core
          microdnf clean all
        else
          dnf -y --nodocs --setopt=install_weak_deps=False install git-core
          dnf clean all
        fi
        _j="$(readlink -f "$(command -v java)")"
        JAVA_HOME="$(dirname "$(dirname "$_j")")"
        export JAVA_HOME
        export PATH="${JAVA_HOME}/bin:${PATH}"
        rm -rf .[!.]* * 2>/dev/null || true
        git clone --depth 1 -b "$(params.revision)" "$(params.url)" .
        mvn -B -DskipTests package

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: springboot-build-image
  namespace: {{ .Release.Namespace }}
spec:
  description: Build and push a Spring Boot container image to the internal OpenShift registry.
  params:
    - name: image
      type: string
      description: Fully qualified image reference to build and push
    - name: dockerfile
      type: string
      default: src/main/docker/Dockerfile.jvm
      description: Path to the Dockerfile relative to the source workspace
    - name: context
      type: string
      default: .
      description: Build context relative to the source workspace
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: registry.redhat.io/rhel9/buildah@sha256:0e29338c43fbf9847f2060d7685b872594e3b39bfcf56278f470279089e48048
      workingDir: $(workspaces.source.path)
      securityContext:
        capabilities:
          add:
            - SETFCAP
      script: |
        #!/usr/bin/env bash
        set -euxo pipefail
        buildah bud \
          --storage-driver=vfs \
          --tls-verify=true \
          --file "$(params.dockerfile)" \
          --tag "$(params.image)" \
          "$(params.context)"
        buildah push \
          --storage-driver=vfs \
          --tls-verify=true \
          "$(params.image)" \
          "docker://$(params.image)"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: springboot-deploy-app
  namespace: {{ .Release.Namespace }}
spec:
  description: Create or update the Spring Boot application deployment.
  params:
    - name: appName
      type: string
      default: workshop-springboot-hello_by_lang
      description: Name to use for the deployed application resources
    - name: image
      type: string
      description: Fully qualified image reference to deploy
    - name: port
      type: string
      default: "8080"
      description: Container port exposed by the app
  steps:
    - name: deploy
      image: registry.redhat.io/openshift4/ose-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euxo pipefail

        cat <<EOF | oc apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $(params.appName)
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: $(params.appName)
          template:
            metadata:
              labels:
                app: $(params.appName)
            spec:
              containers:
              - name: app
                image: $(params.image)
                imagePullPolicy: Always
                ports:
                - containerPort: $(params.port)
                  name: http
                  protocol: TCP
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: $(params.appName)
        spec:
          selector:
            app: $(params.appName)
          ports:
          - name: http
            port: $(params.port)
            protocol: TCP
            targetPort: http
        ---
        apiVersion: route.openshift.io/v1
        kind: Route
        metadata:
          name: $(params.appName)
        spec:
          to:
            kind: Service
            name: $(params.appName)
          port:
            targetPort: http
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        EOF

        oc rollout status deployment/$(params.appName) --timeout=5m
