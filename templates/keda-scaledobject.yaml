apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: workshop-springboot-keda-autoscaling
  namespace: {{ .Release.Namespace }}
  labels:
    app: workshop-springboot-keda-autoscaling
spec:
  scaleTargetRef:
    name: workshop-springboot-keda-autoscaling
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-kafka-bootstrap.{{ .Release.Namespace }}.svc.cluster.local:9092
        consumerGroup: keda-consumer-group
        topic: keda-events
        lagThreshold: "50"
        activationLagThreshold: "1"
        offsetResetPolicy: "earliest"
